  <body class="bg-slate-50 antialiased selection:bg-indigo-100 select-none md:select-text">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Proactive Service Worker & Cache Cleaner (Prevents stale white-screen during rapid updates) -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let registration of registrations) {
            registration.unregister().then((success) => {
              if (success) console.log('Stale Service Worker unregistered.');
            });
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then((keys) => {
          keys.forEach((key) => {
            caches.delete(key).then(() => {
              console.log('Stale cache storage purged:', key);
            });
          });
        });
      }
    </script>
  </body>
